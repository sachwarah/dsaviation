<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DS Aviation</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <style>
    :root {
      --bg: #f4f7fb;
      --text: #102033;
      --accent: #1f5a92;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #e7eef7 0%, var(--bg) 100%);
      color: var(--text);
    }

    h1 {
      color: var(--accent);
    }

    p {
      line-height: 1.6;
    }

    .contact {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="container py-5">
    <section class="row justify-content-center">
      <div class="col-md-10 col-lg-8">
        <div class="card border-0 shadow-lg rounded-4 text-center">
          <div class="card-body p-4 p-md-5">
            <h1 class="display-5 fw-bold mb-3">DS Aviation</h1>
            <p class="lead mb-3">Professional aviation services with a focus on safety, reliability, and operational excellence.</p>
            <p class="mb-0">We support clients with practical aviation solutions tailored to modern industry needs.</p>
            <p class="contact mt-4 mb-0">Contact: info@dsaviation.co.uk</p>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
</body>
</html>
