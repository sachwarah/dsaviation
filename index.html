<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DS Aviation</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --text: #102033;
      --accent: #1f5a92;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #e7eef7 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    .card {
      background: var(--card);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(16, 32, 51, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2.5rem;
      color: var(--accent);
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    .contact {
      margin-top: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>DS Aviation</h1>
      <p>Professional aviation services with a focus on safety, reliability, and operational excellence.</p>
      <p>We support clients with practical aviation solutions tailored to modern industry needs.</p>
      <p class="contact">Contact: info@dsaviation.co.uk</p>
    </section>
  </main>
</body>
</html>
